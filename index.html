<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SG Temp — Live Singapore Temperature</title>
  <meta name="description" content="Live air temperature across Singapore's weather stations, with a 24-hour rolling view. Data from NEA via data.gov.sg.">
  <link rel="preconnect" href="https://api.data.gov.sg" crossorigin>
  <link rel="preconnect" href="https://api-open.data.gov.sg" crossorigin>
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin>
  <!-- Leaflet is vendored: same-origin assets can't be rate-limited by a
       third-party CDN, which used to break the whole layout -->
  <link rel="stylesheet" href="assets/vendor/leaflet/leaflet.css">
  <!-- bump ?v= whenever style.css or app.js changes: stale cached assets
       under a fresh index.html render a broken hybrid of old and new -->
  <link rel="stylesheet" href="assets/style.css?v=20260611x">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>SG Temp</h1>
      <span class="subtitle">live island temperature</span>
    </div>
    <div class="summary" id="summary">
      <div class="stat"><span class="stat-value" id="stat-min">–</span><span class="stat-label">coolest</span></div>
      <div class="stat"><span class="stat-value" id="stat-mean">–</span><span class="stat-label">average</span></div>
      <div class="stat"><span class="stat-value" id="stat-max">–</span><span class="stat-label">hottest</span></div>
    </div>
    <div class="refresh" id="refresh-status">loading…</div>
  </header>

  <div class="banner hidden" id="error-banner"></div>

  <main class="layout">
    <div class="map-wrap">
      <div id="map" aria-label="Map of Singapore weather stations">
        <canvas id="wind" aria-hidden="true"></canvas>
      </div>
      <div class="legend" title="Colour scale, normalized to the temperatures currently shown">
        <span id="legend-lo">–</span>
        <div class="legend-bar"></div>
        <span id="legend-hi">–</span>
      </div>
      <div class="timebar">
        <button id="live-btn" title="Jump to latest reading">LIVE</button>
        <button id="wind-btn" title="Toggle wind streaks">WIND</button>
        <button id="radar-btn" title="Toggle precipitation radar">RADAR</button>
        <div class="slider-wrap">
          <input type="range" id="time-slider" min="0" max="0" step="1" value="0"
                 aria-label="Time scrubber: 24 hours back to 24 hours ahead">
        </div>
        <span id="sky-icon" aria-hidden="true"></span>
        <span id="time-label">–</span>
      </div>
      <button id="panel-show" class="hidden" title="Show stations">«</button>
    </div>

    <aside class="panel" id="side-panel">
      <section class="detail hidden" id="detail">
        <div class="detail-head">
          <h2 id="detail-name"></h2>
          <button id="detail-close" aria-label="Close detail">×</button>
        </div>
        <div class="detail-now"><span id="detail-temp"></span><span class="detail-when" id="detail-when"></span></div>
        <svg id="detail-spark" viewBox="0 0 320 80" preserveAspectRatio="none"></svg>
        <div class="detail-range">
          <span>24h low <strong id="detail-low">–</strong></span>
          <span>24h high <strong id="detail-high">–</strong></span>
        </div>
      </section>

      <section class="stations">
        <div class="panel-head">
          <h2 class="panel-title">Stations <span id="station-count"></span></h2>
          <select id="list-filter" aria-label="Filter station list">
            <option value="all">All</option>
            <option value="temp">Temperature</option>
            <option value="wind">Wind</option>
            <option value="civ">Community</option>
          </select>
          <button id="panel-btn" title="Hide panel">»</button>
        </div>
        <ul id="station-list"></ul>
      </section>
    </aside>
  </main>

  <footer class="footer">
    Data: <a href="https://data.gov.sg" target="_blank" rel="noopener">NEA via data.gov.sg</a>
    (<a href="https://data.gov.sg/open-data-licence" target="_blank" rel="noopener">Singapore Open Data Licence</a>)
    · shading: <span id="shade-mode">stations only</span>,
    model grid by <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a>
    · wind <span id="wind-status">–</span>
    · rain <span id="rain-status">…</span>
    · radar <span id="sat-status">…</span>
    · community <span id="civ-status">…</span>
    · refreshes every minute
    · v<span id="app-version">?</span>
  </footer>

  <script src="assets/vendor/leaflet/leaflet.js"></script>
  <script src="assets/app.js?v=20260611x"></script>
</body>
</html>
