name: Refresh forecast model

on:
  schedule:
    - cron: "20 */3 * * *" # every 3 hours; Open-Meteo models update hourly-ish
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-model.mjs
      - name: Commit data
        run: |
          git config user.name "model-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/model.json
          git diff --cached --quiet || git commit -m "Update forecast model data"
          git push
